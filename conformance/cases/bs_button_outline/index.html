<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../_bootstrap/bootstrap.min.css">
<style>body{margin:0;padding:16px;background:#fff}</style>
</head>
<body>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <button type="button" class="btn btn-outline-primary">Primary</button>
    <button type="button" class="btn btn-outline-secondary">Secondary</button>
    <button type="button" class="btn btn-outline-success">Success</button>
    <button type="button" class="btn btn-outline-danger">Danger</button>
    <button type="button" class="btn btn-outline-warning">Warning</button>
    <button type="button" class="btn btn-outline-info">Info</button>
    <button type="button" class="btn btn-outline-light bg-dark">Light</button>
    <button type="button" class="btn btn-outline-dark">Dark</button>
  </div>
  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <button type="button" class="btn btn-outline-primary btn-lg">Large</button>
    <button type="button" class="btn btn-outline-primary">Default</button>
    <button type="button" class="btn btn-outline-primary btn-sm">Small</button>
    <button type="button" class="btn btn-outline-primary" disabled>Disabled</button>
  </div>
  <div class="d-grid gap-2 col-4">
    <button type="button" class="btn btn-outline-success">Block A</button>
    <button type="button" class="btn btn-outline-danger">Block B</button>
  </div>
</body>
</html>
