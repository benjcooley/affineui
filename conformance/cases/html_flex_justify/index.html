<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 16px; }
  .tag { font-size: 11px; color: #888; margin: 0 0 2px; }
  .row {
    display: flex;
    width: 460px;
    height: 44px;
    background: #eceff1;
    margin: 0 0 10px;
  }
  .row > div { width: 60px; background: #1976d2; }
  .start   { justify-content: flex-start; }
  .center  { justify-content: center; }
  .end     { justify-content: flex-end; }
  .between { justify-content: space-between; }
  .around  { justify-content: space-around; }
  .evenly  { justify-content: space-evenly; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="tag">flex-start</p>
    <div class="row start"><div></div><div></div><div></div></div>
    <p class="tag">center</p>
    <div class="row center"><div></div><div></div><div></div></div>
    <p class="tag">flex-end</p>
    <div class="row end"><div></div><div></div><div></div></div>
    <p class="tag">space-between</p>
    <div class="row between"><div></div><div></div><div></div></div>
    <p class="tag">space-around</p>
    <div class="row around"><div></div><div></div><div></div></div>
    <p class="tag">space-evenly</p>
    <div class="row evenly"><div></div><div></div><div></div></div>
  </div>
</body>
</html>
