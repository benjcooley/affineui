<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../_bootstrap/bootstrap.min.css">
<style>body{margin:0;padding:16px;background:#fff}</style>
</head>
<body>
  <div class="d-flex flex-wrap gap-5">
    <div>
      <h6 class="mb-3">Checkboxes</h6>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="c1" checked>
        <label class="form-check-label" for="c1">Checked checkbox</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="c2">
        <label class="form-check-label" for="c2">Default checkbox</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="c3" checked disabled>
        <label class="form-check-label" for="c3">Disabled checked</label>
      </div>
    </div>
    <div>
      <h6 class="mb-3">Radios</h6>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="r" id="r1" checked>
        <label class="form-check-label" for="r1">Selected radio</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="r" id="r2">
        <label class="form-check-label" for="r2">Default radio</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="r" id="r3" disabled>
        <label class="form-check-label" for="r3">Disabled radio</label>
      </div>
    </div>
    <div>
      <h6 class="mb-3">Switches</h6>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="s1" checked>
        <label class="form-check-label" for="s1">Checked switch</label>
      </div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="s2">
        <label class="form-check-label" for="s2">Default switch</label>
      </div>
    </div>
  </div>
</body>
</html>
