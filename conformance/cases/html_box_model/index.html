<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; }
  .wrap { padding: 24px; }
  .label { font-size: 12px; color: #333; margin: 0 0 6px; }
  /* content-box: width is content only; total = 200 + 20*2 pad + 6*2 border */
  .cb {
    box-sizing: content-box;
    width: 200px; height: 60px;
    padding: 20px;
    border: 6px solid #1565c0;
    background: #bbdefb;
    margin: 0 0 24px;
  }
  /* border-box: width includes padding + border; total = 200 */
  .bb {
    box-sizing: border-box;
    width: 200px; height: 60px;
    padding: 20px;
    border: 6px solid #2e7d32;
    background: #c8e6c9;
  }
</style>
</head>
<body>
  <div class="wrap">
    <p class="label">content-box (width 200 = content only)</p>
    <div class="cb"></div>
    <p class="label">border-box (width 200 = content + padding + border)</p>
    <div class="bb"></div>
  </div>
</body>
</html>
