<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../_bootstrap/bootstrap.min.css">
<style>body{margin:0;padding:16px;background:#fff}</style>
</head>
<body>
  <table class="table table-striped table-bordered mb-4">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">First</th>
        <th scope="col">Last</th>
        <th scope="col">Handle</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">1</th>
        <td>Mark</td>
        <td>Otto</td>
        <td>@mdo</td>
      </tr>
      <tr>
        <th scope="row">2</th>
        <td>Jacob</td>
        <td>Thornton</td>
        <td>@fat</td>
      </tr>
      <tr class="table-active">
        <th scope="row">3</th>
        <td>Larry</td>
        <td>the Bird</td>
        <td>@twitter</td>
      </tr>
    </tbody>
  </table>

  <table class="table table-hover">
    <thead class="table-dark">
      <tr>
        <th scope="col">#</th>
        <th scope="col">Status</th>
        <th scope="col">Value</th>
      </tr>
    </thead>
    <tbody>
      <tr class="table-primary"><th scope="row">1</th><td>Primary</td><td>10</td></tr>
      <tr class="table-success"><th scope="row">2</th><td>Success</td><td>20</td></tr>
      <tr class="table-danger"><th scope="row">3</th><td>Danger</td><td>30</td></tr>
      <tr class="table-warning"><th scope="row">4</th><td>Warning</td><td>40</td></tr>
    </tbody>
  </table>
</body>
</html>
