<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 24px; }
  table {
    border-collapse: collapse;
    width: 420px;
    font-size: 15px;
  }
  th, td {
    border: 1px solid #90a4ae;
    padding: 8px 12px;
    text-align: left;
  }
  thead th { background: #cfd8dc; }
  tbody tr:nth-child(even) td { background: #eceff1; }
</style>
</head>
<body>
  <div class="wrap">
    <table>
      <thead>
        <tr><th>Name</th><th>Role</th><th>Score</th></tr>
      </thead>
      <tbody>
        <tr><td>Ada</td><td>Engineer</td><td>92</td></tr>
        <tr><td>Bob</td><td>Designer</td><td>87</td></tr>
        <tr><td>Cora</td><td>Manager</td><td>78</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
