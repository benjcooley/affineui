<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../_bootstrap/bootstrap.min.css">
<style>body{margin:0;padding:16px;background:#fff}</style>
</head>
<body>
  <div class="progress mb-3" role="progressbar" aria-label="Basic" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar" style="width: 25%">25%</div>
  </div>
  <div class="progress mb-3" role="progressbar" aria-label="Success" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar bg-success" style="width: 50%">50%</div>
  </div>
  <div class="progress mb-3" role="progressbar" aria-label="Info" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar bg-info" style="width: 75%">75%</div>
  </div>
  <div class="progress mb-3" role="progressbar" aria-label="Warning" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar bg-warning text-dark" style="width: 100%">100%</div>
  </div>
  <div class="progress mb-3" role="progressbar" aria-label="Striped" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar progress-bar-striped bg-danger" style="width: 60%"></div>
  </div>
  <div class="progress-stacked">
    <div class="progress" role="progressbar" aria-label="Segment one" aria-valuenow="35" aria-valuemin="0" aria-valuemax="100" style="width: 35%">
      <div class="progress-bar">35%</div>
    </div>
    <div class="progress" role="progressbar" aria-label="Segment two" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100" style="width: 20%">
      <div class="progress-bar bg-success">20%</div>
    </div>
    <div class="progress" role="progressbar" aria-label="Segment three" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100" style="width: 10%">
      <div class="progress-bar bg-info">10%</div>
    </div>
  </div>
</body>
</html>
