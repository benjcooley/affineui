<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; height: 100%; font-family: sans-serif;
               background: #1e1e2e; color: #cdd6f4; }
  .wrap { padding: 24px; }
  h1    { color: #f38ba8; margin: 0 0 12px; }
  .card { background: #313244; border-radius: 8px; padding: 16px; max-width: 360px; }
  p     { margin: 0 0 12px; }
  .btn  { display: inline-block; padding: 8px 16px; background: #89b4fa;
          color: #11111b; border-radius: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Conformance: hello</h1>
    <div class="card">
      <p>A/B snapshot of AffineUI vs a real browser.</p>
      <div class="btn">Button</div>
    </div>
  </div>
</body>
</html>
