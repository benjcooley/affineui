<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../_bootstrap/bootstrap.min.css">
<style>body{margin:0;padding:16px;background:#fff}</style>
</head>
<body>
  <div style="max-width: 480px;">
    <div class="mb-3">
      <label for="ex1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="ex1" value="name@example.com">
    </div>
    <div class="mb-3">
      <label for="ex2" class="form-label">Password</label>
      <input type="password" class="form-control" id="ex2" value="secret">
    </div>
    <div class="mb-3">
      <label for="ex3" class="form-label">Disabled input</label>
      <input type="text" class="form-control" id="ex3" value="Disabled" disabled>
    </div>
    <div class="mb-3">
      <label for="exSel" class="form-label">Select</label>
      <select class="form-select" id="exSel">
        <option selected>Open this select menu</option>
        <option>One</option>
        <option>Two</option>
      </select>
    </div>
    <div class="row g-2">
      <div class="col">
        <label for="exSm" class="form-label">Small</label>
        <input type="text" class="form-control form-control-sm" id="exSm" value="Small input">
      </div>
      <div class="col">
        <label for="exLg" class="form-label">Large</label>
        <input type="text" class="form-control form-control-lg" id="exLg" value="Large">
      </div>
    </div>
  </div>
</body>
</html>
