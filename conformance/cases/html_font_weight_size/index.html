<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 24px; }
  p { margin: 0 0 10px; }
  .w300 { font-weight: 300; }
  .w400 { font-weight: 400; }
  .w700 { font-weight: 700; }
  .w900 { font-weight: 900; }
  .s12 { font-size: 12px; }
  .s18 { font-size: 18px; }
  .s28 { font-size: 28px; }
  .s40 { font-size: 40px; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="w300 s18">Weight 300 light</p>
    <p class="w400 s18">Weight 400 normal</p>
    <p class="w700 s18">Weight 700 bold</p>
    <p class="w900 s18">Weight 900 black</p>
    <p class="w400 s12">Size 12px</p>
    <p class="w400 s18">Size 18px</p>
    <p class="w400 s28">Size 28px</p>
    <p class="w400 s40">Size 40px</p>
  </div>
</body>
</html>
