<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #fff; }
  .wrap { padding: 24px; }
  .tag { font-size: 11px; color: #888; margin: 16px 0 4px; }
  .row { display: flex; }
  .row > div {
    width: 80px; height: 50px;
    background: #3949ab;
    margin-right: 8px;
    font-size: 12px;
    text-align: center;
    line-height: 50px;
  }
  /* display:none removes the box entirely (no gap reserved) */
  .gone { display: none; }
  /* visibility:hidden keeps the box's space but paints nothing */
  .invisible { visibility: hidden; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="tag">display: none (middle box removed, no gap kept)</p>
    <div class="row">
      <div>1</div>
      <div class="gone">2</div>
      <div>3</div>
    </div>

    <p class="tag">visibility: hidden (middle box invisible, gap kept)</p>
    <div class="row">
      <div>1</div>
      <div class="invisible">2</div>
      <div>3</div>
    </div>
  </div>
</body>
</html>
