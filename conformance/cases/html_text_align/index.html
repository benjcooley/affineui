<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 24px; }
  .row {
    width: 480px;
    border: 1px solid #cfd8dc;
    margin: 0 0 16px;
    padding: 8px;
    font-size: 16px;
  }
  .left    { text-align: left; }
  .center  { text-align: center; }
  .right   { text-align: right; }
  .justify { text-align: justify; }
  .tag { display: block; font-size: 11px; color: #888; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row left"><span class="tag">left</span>The quick brown fox jumps.</div>
    <div class="row center"><span class="tag">center</span>The quick brown fox jumps.</div>
    <div class="row right"><span class="tag">right</span>The quick brown fox jumps.</div>
    <div class="row justify"><span class="tag">justify</span>The quick brown fox jumps over the lazy dog repeatedly across this line.</div>
  </div>
</body>
</html>
