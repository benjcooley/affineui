<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #ffffff; }
  /* A single line on a tinted line-box so the baseline + line-height are
     directly visible. font shorthand = 32px size / 1.5 line-height. */
  .line { margin: 40px; background: #cfe2ff; color: #000000;
          font: 32px/1.5 sans-serif; }
</style>
</head>
<body>
  <div class="line">Baseline Mg quick</div>
</body>
</html>
