<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 24px; font-size: 20px; }
  p { margin: 0 0 16px; }
  .underline   { text-decoration: underline; }
  .overline    { text-decoration: overline; }
  .linethrough { text-decoration: line-through; }
  .italic      { font-style: italic; }
  .upper       { text-transform: uppercase; }
  .colored     { text-decoration: underline; text-decoration-color: #d32f2f; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="underline">underlined text</p>
    <p class="overline">overline text</p>
    <p class="linethrough">strikethrough text</p>
    <p class="italic">italic text</p>
    <p class="upper">uppercase transform</p>
    <p class="colored">colored underline</p>
  </div>
</body>
</html>
