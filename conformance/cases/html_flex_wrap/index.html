<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 16px; }
  .tag { font-size: 11px; color: #888; margin: 10px 0 2px; }
  .row {
    display: flex;
    width: 300px;
    background: #eceff1;
    gap: 8px;
  }
  .row > div { width: 80px; height: 40px; background: #00838f; }
  .nowrap { flex-wrap: nowrap; }
  .wrapy  { flex-wrap: wrap; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="tag">flex-wrap: nowrap (shrinks to fit one line)</p>
    <div class="row nowrap"><div></div><div></div><div></div><div></div></div>
    <p class="tag">flex-wrap: wrap (overflow items move to next line)</p>
    <div class="row wrapy"><div></div><div></div><div></div><div></div></div>
  </div>
</body>
</html>
