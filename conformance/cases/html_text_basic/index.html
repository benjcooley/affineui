<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; color: #212121; }
  .wrap { padding: 24px; max-width: 520px; }
  h1 { font-size: 28px; margin: 0 0 12px; }
  p  { font-size: 16px; line-height: 1.5; margin: 0 0 16px; }
  .small { font-size: 13px; color: #555; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Basic text rendering</h1>
    <p>This paragraph wraps across multiple lines so line-height,
       wrapping, and baseline spacing can be compared between a real
       browser and AffineUI on identical content.</p>
    <p class="small">A smaller secondary line of text in gray.</p>
  </div>
</body>
</html>
