<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: #fff; font-family: sans-serif; }
  .grid {
    padding: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .cell { width: 160px; }
  .cap { font-size: 12px; color: #333; margin: 6px 0 0; text-align: center; }
  .box { width: 160px; height: 90px; }

  .solid { background-color: #00897b; }
  .lin   { background: linear-gradient(to right, #ff5722, #ffc107); }
  .lin45 { background: linear-gradient(45deg, #3f51b5, #03a9f4); }
  .rad   { background: radial-gradient(circle, #e91e63, #4a148c); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box solid"></div><p class="cap">solid color</p></div>
    <div class="cell"><div class="box lin"></div><p class="cap">linear →</p></div>
    <div class="cell"><div class="box lin45"></div><p class="cap">linear 45deg</p></div>
    <div class="cell"><div class="box rad"></div><p class="cap">radial</p></div>
  </div>
</body>
</html>
