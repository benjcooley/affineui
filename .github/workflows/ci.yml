name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configure:
    name: Configure (${{ matrix.os }}, stub build)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux X11/GL dev packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev \
            libgl1-mesa-dev libasound2-dev ninja-build

      - name: Install ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure CMake (stub mode — no external/ fetched)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release

  amalgamate-manifest:
    name: Amalgamator dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run amalgamator in preview mode
        run: python3 tools/amalgamate.py --root . --out build/dist

  full-build:
    name: Full build (${{ matrix.os }}, real deps)
    runs-on: ${{ matrix.os }}
    needs: configure
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux X11/GL dev packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev \
            libgl1-mesa-dev libasound2-dev ninja-build

      - name: Install ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Fetch vendored deps
        shell: bash
        run: ./scripts/fetch_deps.sh

      - name: Configure CMake (real deps)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release
