name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows (D3D11)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Visual Studio generator => self-contained, no vcvars/Ninja setup needed.
      # The msvc preset resolves the backend to d3d11 on Windows.
      - name: Configure
        run: cmake --preset msvc
      - name: Build
        run: cmake --build build/msvc --config RelWithDebInfo --parallel
      - name: Test
        run: ctest --test-dir build/msvc -C RelWithDebInfo --output-on-failure

  linux:
    name: Linux (GL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install X11 / GL / ALSA dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxi-dev libxcursor-dev libgl1-mesa-dev libasound2-dev
      # Backend auto-resolves to gl on Linux. external/ is vendored (committed),
      # so no dependency fetch step is needed.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

# Deferred jobs (tracked, intentionally not run yet):
#   * macOS — sokol is Metal-only on macOS and nanovg_sokol.h has no MSL
#     shader variant yet (HLSL + GLSL only). Add a macos-latest job once the
#     Metal/MSL path lands.
#   * Amalgamator (two-file dist) — tools/amalgamate.py's manifest still
#     references the removed GL paint path (layer.cpp/composite.cpp/
#     nanovg_impl.c) and omits sokol_gfx/sokol_glue. Returns as a job once it
#     emits a buildable sokol_gfx two-file SDK (and the job should *compile*
#     the output, not just emit it).
